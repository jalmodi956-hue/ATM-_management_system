<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
    <h2>Search Transaction</h2>

    <form method="POST">
        <label for="keyword">Transaction Type</label>
        <input
            type="text"
            id="keyword"
            name="keyword"
            placeholder="Example: Deposit / Withdraw / Money Transfer"
            required
        >
        <button type="submit">Search</button>
    </form>

    {% if data %}
    <div class="table-wrapper">
        <table>
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>₹ {{ row[1] }}</td>
                <td>{{ row[2] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    {% elif request.method == "POST" %}
    <p>No matching transactions found.</p>
    {% endif %}

    <a href="/dashboard" class="back">← Back to Dashboard</a>
</div>

</body>
</html>
