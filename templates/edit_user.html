<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
    <h2>Edit User</h2>

    <form method="POST">
        <label for="name">Full Name</label>
        <input
            type="text"
            id="name"
            name="name"
            value="{{ user[3] }}"
            required
        >

        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            value="{{ user[4] }}"
            required
        >

        <label for="card">Card Number</label>
        <input
            type="text"
            id="card"
            name="card"
            value="{{ user[1] }}"
            required
        >

        <label for="pin">New PIN</label>
        <input
            type="password"
            id="pin"
            name="pin"
            placeholder="Enter New PIN"
            required
        >

        <label for="balance">Balance</label>
        <input
            type="number"
            id="balance"
            name="balance"
            value="{{ user[5] }}"
            step="0.01"
            required
        >

        <button type="submit">Update User</button>
    </form>

    <a href="/all_users" class="back">← Back to All Users</a>
</div>

</body>
</html>
