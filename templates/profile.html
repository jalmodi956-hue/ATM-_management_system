<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="profile-box">
    <h2>My Profile</h2>

    {% if user[4] %}
        <img src="{{ url_for('static', filename='uploads/' + user[4]) }}" alt="Profile Picture">
    {% else %}
        <p>No profile picture uploaded.</p>
    {% endif %}

    <div class="profile-details">
        <p><strong>Name:</strong> {{ user[1] }}</p>
        <p><strong>Email:</strong> {{ user[2] }}</p>
        <p><strong>Card Number:</strong> {{ user[0] }}</p>
        <p><strong>Balance:</strong> ₹ {{ user[3] }}</p>
    </div>

    <div class="btn-row">
        <a href="/edit_profile" class="btn">Edit Profile</a>
        <a href="/dashboard" class="btn btn-dark">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
