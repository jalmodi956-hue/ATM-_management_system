<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | ATM Management System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        🏧 ATM System
    </div>

    <div>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('profile') }}">Profile</a>
        <a href="{{ url_for('account_details') }}">Account</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

</nav>


<main class="container">

    <h1 class="page-title">
        ✏️ Edit Profile
    </h1>


    <div class="profile-card">

        {% if user %}

        <div class="profile-image"
             style="
                display:flex;
                justify-content:center;
                align-items:center;
                margin:auto;
                width:120px;
                height:120px;
                border-radius:50%;
                background:#eff6ff;
                font-size:60px;
             ">
            👤
        </div>


        <form method="POST"
              action="{{ url_for('edit_profile') }}"
              id="editProfileForm">

            <div class="form-group">

                <label for="card">
                    Card Number
                </label>

                <input
                    type="text"
                    id="card"
                    value="{{ user[0] }}"
                    disabled>

            </div>


            <div class="form-group">

                <label for="name">
                    Full Name
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    value="{{ user[1] or '' }}"
                    maxlength="100"
                    required>

            </div>


            <div class="form-group">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ user[2] or '' }}"
                    maxlength="150"
                    required>

            </div>


            <div class="alert alert-info">
                👤 Update your profile information.
            </div>


            <button
                type="submit"
                class="btn btn-success btn-block">

                💾 Save Changes

            </button>

        </form>

        {% else %}

        <div class="empty-state">

            <h3>
                👤 Profile Not Found
            </h3>

            <p>
                User profile not found.
            </p>

        </div>

        {% endif %}


        <div class="button-group">

            <a href="{{ url_for('profile') }}"
               class="btn btn-info">
                👤 My Profile
            </a>

            <a href="{{ url_for('change_pin') }}"
               class="btn btn-warning">
                🔐 Change PIN
            </a>

            <a href="{{ url_for('account_details') }}"
               class="btn btn-success">
                🏦 Account Details
            </a>

            <a href="{{ url_for('dashboard') }}"
               class="btn btn-dark">
                ← Back to Dashboard
            </a>

        </div>

    </div>

</main>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
