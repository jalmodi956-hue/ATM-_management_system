<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Receipt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
    <h2>ATM Transaction Receipt</h2>

    <p><strong>Card Number:</strong> {{ card }}</p>
    <p><strong>Transaction Type:</strong> {{ transaction[0] }}</p>
    <p><strong>Amount:</strong> ₹ {{ transaction[1] }}</p>
    <p><strong>Date:</strong> {{ transaction[2] }}</p>

    <div class="btn-row">
        <button class="btn" onclick="window.print()">Print Receipt</button>
        <a href="/dashboard" class="btn">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
