<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-box">
    <div style="text-align:center;">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="ATM Logo" width="100">
    </div>

    <h2>ATM Login</h2>

    <form method="POST">
        <label for="card">ATM Card Number</label>
        <input
            type="text"
            id="card"
            name="card"
            placeholder="Enter ATM Card Number"
            required
        >

        <label for="pin">PIN</label>
        <input
            type="password"
            id="pin"
            name="pin"
            placeholder="Enter PIN"
            required
        >

        <button type="submit">Login</button>
    </form>

    <p>
        <a href="/forgot_pin">Forgot PIN?</a>
    </p>

    <p>
        Don't have an account?
        <a href="/register">Register Here</a>
    </p>

    <hr>

    <p><strong>Demo Card:</strong> 246450307052</p>
    <p><strong>PIN:</strong> #Rm_54321</p>
</div>

</body>
</html>
