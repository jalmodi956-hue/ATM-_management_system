<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
    <h2>Fixed Deposit</h2>

    <form method="POST">
        <label for="amount">FD Amount</label>
        <input
            type="number"
            id="amount"
            name="amount"
            placeholder="Enter FD Amount"
            min="1"
            step="0.01"
            required
        >

        <label for="months">Duration (Months)</label>
        <input
            type="number"
            id="months"
            name="months"
            placeholder="Enter Number of Months"
            min="1"
            required
        >

        <button type="submit">Create FD</button>
    </form>

    {% if success %}
        <p><strong>{{ success }}</strong></p>
    {% endif %}

    {% if maturity_amount %}
        <p><strong>Maturity Amount:</strong> ₹ {{ maturity_amount }}</p>
    {% endif %}

    <a href="/dashboard" class="back">← Back to Dashboard</a>
</div>

</body>
</html>
