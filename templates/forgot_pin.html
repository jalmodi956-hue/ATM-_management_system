<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Forgot PIN | ATM Management System
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<nav class="navbar">

    <div class="logo">
        🏧 ATM System
    </div>

    <div>
        <a href="{{ url_for('login') }}">
            Login
        </a>

        <a href="{{ url_for('register') }}">
            Register
        </a>

        <a href="{{ url_for('admin_login') }}">
            Admin Login
        </a>
    </div>

</nav>


<div class="form-container">

    <h1>
        🔐 Reset ATM PIN
    </h1>

    <p class="text-center text-muted mb-2">
        Verify your registered security details
        and create a new ATM PIN.
    </p>


    <form
        method="POST"
        action="{{ url_for('forgot_pin') }}"
        id="forgotPinForm"
    >

        <div class="form-group">

            <label for="card">
                Card Number
            </label>

            <input
                type="text"
                id="card"
                name="card"
                placeholder="Enter your card number"
                inputmode="numeric"
                pattern="[0-9]+"
                autocomplete="off"
                maxlength="19"
                required
                autofocus
            >

        </div>


        <div class="form-group">

            <label for="security_question">
                Security Question
            </label>

            <select
                id="security_question"
                name="security_question"
                required
            >

                <option value="">
                    Select security question
                </option>

                <option value="What is your favorite color?">
                    What is your favorite color?
                </option>

                <option value="What is your favorite food?">
                    What is your favorite food?
                </option>

                <option value="What is your first school name?">
                    What is your first school name?
                </option>

                <option value="What is your favorite city?">
                    What is your favorite city?
                </option>

                <option value="What is your childhood nickname?">
                    What is your childhood nickname?
                </option>

            </select>

        </div>


        <div class="form-group">

            <label for="security_answer">
                Security Answer
            </label>

            <input
                type="password"
                id="security_answer"
                name="security_answer"
                placeholder="Enter your security answer"
                autocomplete="off"
                maxlength="100"
                required
            >

        </div>


        <div class="form-group">

            <label for="new_pin">
                New PIN
            </label>

            <input
                type="password"
                id="new_pin"
                name="new_pin"
                placeholder="Enter 4 to 6 digit PIN"
                autocomplete="new-password"
                inputmode="numeric"
                pattern="[0-9]{4,6}"
                minlength="4"
                maxlength="6"
                required
            >

        </div>


        <div class="form-group">

            <label for="confirm_pin">
                Confirm New PIN
            </label>

            <input
                type="password"
                id="confirm_pin"
                name="confirm_pin"
                placeholder="Confirm your new PIN"
                autocomplete="new-password"
                inputmode="numeric"
                pattern="[0-9]{4,6}"
                minlength="4"
                maxlength="6"
                required
            >

        </div>


        <div class="alert alert-warning">
            ⚠️ Security question and answer must
            match your registered ATM account.
        </div>


        <div class="alert alert-info">
            🔐 New PIN must contain only
            4 to 6 numeric digits.
        </div>


        <button
            type="submit"
            class="btn btn-success btn-block"
        >
            🔑 Reset PIN
        </button>

    </form>


    <div class="auth-link">

        Remember your PIN?

        <a href="{{ url_for('login') }}">
            Back to Login
        </a>

    </div>

</div>


<script
    src="{{ url_for('static', filename='script.js') }}"
></script>

</body>

</html>
